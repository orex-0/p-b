<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Overlay Card UI</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background: #111;
        padding: 40px;
        color: #fff;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    /* Card container */
    .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
    }

    /* Card styling */
    .card {
        position: relative;
        overflow: hidden;
        border-radius: 15px;
        cursor: pointer;
        height: 350px;
        background: #000;
    }

    /* Card image */
    .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    /* Gradient overlay */
    .card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.1));
        opacity: 0.8;
        transition: opacity 0.4s ease;
    }

    /* Card content */
    .card-content {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        transform: translateY(40px);
        opacity: 0;
        transition: all 0.4s ease;
        z-index: 2;
    }

    .card-content h3 {
        font-size: 1.4rem;
        margin-bottom: 8px;
    }

    .card-content p {
        font-size: 0.95rem;
        color: #ddd;
        line-height: 1.4;
    }

    /* Hover effects */
    .card:hover img {
        transform: scale(1.1);
    }

    .card:hover::after {
        opacity: 1;
    }

    .card:hover .card-content {
        transform: translateY(0);
        opacity: 1;
    }

    /* Responsive text */
    @media (max-width: 500px) {
        .card-content h3 {
            font-size: 1.1rem;
        }
        .card-content p {
            font-size: 0.85rem;
        }
    }
</style>
</head>
<body>

<h1>Gradient Overlay Card UI</h1>

<div class="card-container">
    <div class="card">
        <img src="https://via.placeholder.com/500x350" alt="Card Image">
        <div class="card-content">
            <h3>Mountain Escape</h3>
            <p>Experience the beauty of nature with breathtaking mountain views.</p>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/500x350" alt="Card Image">
        <div class="card-content">
            <h3>City Lights</h3>
            <p>Discover the vibrant nightlife and stunning skylines of the city.</p>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/500x350" alt="Card Image">
        <div class="card-content">
            <h3>Beach Paradise</h3>
            <p>Relax on golden sands and enjoy crystal-clear waters.</p>
        </div>
    </div>
</div>

</body>
</html>
